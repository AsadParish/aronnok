<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="stylesheet" href="style.css">
<style>

  /* ── Homepage link ── */
  .home-link-bar {
    text-align: center;
    padding: 10px 16px;
    background: #f5f5f0;
    border-bottom: 1px solid #ddd;
  }
  .home-link-bar.bottom {
    border-bottom: none;
    border-top: 1px solid #ddd;
    margin-top: 32px;
  }
  .home-link-bar a {
    color: #2e7d32;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s;
  }
  .home-link-bar a:hover { opacity: 0.75; }

  /* ── Price display ── */
  .price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 4px 0 10px;
    width: 100%;
    flex-shrink: 0;
  }
  .price-current {
    font-weight: 600;
    color: #2e7d32;
    white-space: nowrap;
  }
  .price-original {
    color: #999;
    text-decoration: line-through;
    font-size: 0.9em;
    white-space: nowrap;
  }

  /* ── Product info — stack vertically, button pushed right ── */
  .product-info {
    display: flex !important;
    flex-direction: column !important;
    align-items: flex-start !important;
  }
  .product-info .btn-secondary {
    align-self: flex-end;
    margin-top: 12px;
  }

  /* ── Including Planter Box line ── */
  .planter-line {
    font-size: 12px;
    color: #666;
    margin: 3px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ── Specifications tooltip trigger ── */
  .spec-trigger {
    position: relative;
    display: inline-flex;
    align-items: center;
  }
  .spec-btn {
    font-size: 11px;
    font-weight: 600;
    color: #2e7d32;
    border: 1px solid #2e7d32;
    border-radius: 4px;
    padding: 1px 7px;
    cursor: pointer;
    background: transparent;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .spec-btn:hover {
    background: #2e7d32;
    color: #fff;
  }

  /* ── Specifications popup ── */
  .spec-popup {
    display: none;
    position: fixed;
    z-index: 8000;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    padding: 16px 20px;
    min-width: 240px;
    font-size: 13px;
    line-height: 1.8;
    color: #333;
  }
  .spec-popup.open { display: block; }
  .spec-popup-title {
    font-weight: 700;
    font-size: 13px;
    color: #2e7d32;
    margin-bottom: 8px;
    border-bottom: 1px solid #eee;
    padding-bottom: 6px;
  }
  .spec-popup table {
    border-collapse: collapse;
    width: 100%;
  }
  .spec-popup td {
    padding: 2px 6px 2px 0;
    vertical-align: top;
  }
  .spec-popup td:first-child {
    font-weight: 600;
    color: #555;
    white-space: nowrap;
    padding-right: 10px;
  }
  .spec-popup-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  .spec-popup-close:hover { color: #333; }

  /* ── Product image — clickable ── */
  .product img {
    cursor: zoom-in;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .product img:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 18px rgba(0,0,0,0.14);
  }

  /* ── Lightbox overlay ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.88);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #lightbox.open { display: flex; }

  #lightbox-img {
    max-width: 80vw;
    max-height: 82vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    cursor: default;
    animation: lb-pop 0.2s ease;
    display: block;
  }
  @keyframes lb-pop {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── Lightbox close ── */
  #lightbox-close {
    position: fixed;
    top: 18px; right: 22px;
    font-size: 28px;
    color: #fff;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
    z-index: 10001;
    transition: opacity 0.15s;
  }
  #lightbox-close:hover { opacity: 1; }

  /* ── Lightbox prev / next ── */
  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 32px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
    transition: background 0.2s;
    line-height: 1;
    user-select: none;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.3); }
  .lb-nav:disabled { opacity: 0.2; cursor: default; }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  .lb-nav.hidden { display: none; }

  /* ── Lightbox counter & caption ── */
  #lightbox-footer {
    position: fixed;
    bottom: 20px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    z-index: 10001;
  }
  #lightbox-caption {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
  }
  #lightbox-counter {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }

  /* ── Lightbox dots ── */
  #lightbox-dots {
    display: flex;
    gap: 6px;
    margin-top: 2px;
    pointer-events: all;
  }
  .lb-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.2s;
  }
  .lb-dot.active { background: #fff; }

</style>
</head>

<body>

<!-- ── Top homepage link ── -->
<div class="home-link-bar">
  <a href="https://asadparish.github.io/aronnok/">← Go to Homepage</a>
</div>

<header class="nav">
  <h2>Shop</h2>
</header>

<section class="section">
  <div class="product-grid" id="productContainer">
    <!-- Products will load here -->
  </div>
</section>

<!-- ── Bottom homepage link ── -->
<div class="home-link-bar bottom">
  <a href="https://asadparish.github.io/aronnok/">← Go to Homepage</a>
</div>

<!-- ── Lightbox ── -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Product image">
  <button id="lightbox-close" aria-label="Close">✕</button>
  <button class="lb-nav" id="lb-prev" aria-label="Previous image">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button class="lb-nav" id="lb-next" aria-label="Next image">&#8250;</button>
  <div id="lightbox-footer">
    <div id="lightbox-caption"></div>
    <div id="lightbox-counter"></div>
    <div id="lightbox-dots"></div>
  </div>
</div>

<!-- ── Specifications popup (single shared) ── -->
<div class="spec-popup" id="specPopup">
  <button class="spec-popup-close" id="specPopupClose" aria-label="Close">✕</button>
  <div class="spec-popup-title">📦 Planter Box Specifications</div>
  <table>
    <tr><td>Type</td><td>Decorative Planter Box</td></tr>
    <tr><td>Dimensions</td><td>4&Prime; &times; 4&Prime; &times; 4.75&Prime; (L&times;W&times;H)</td></tr>
    <tr><td>Material</td><td>Durable Lightweight Polymer</td></tr>
    <tr><td>Finish</td><td>Hand-painted Acrylic Artwork</td></tr>
    <tr><td>Recommended</td><td>Indoor Plants &amp; Desk D&eacute;cor</td></tr>
  </table>
</div>

<script>

/* ════════════════════════════════
   SPECIFICATIONS POPUP
════════════════════════════════ */
const specPopup = document.getElementById('specPopup');
const specPopupClose = document.getElementById('specPopupClose');

function openSpecPopup(triggerBtn) {
  const rect = triggerBtn.getBoundingClientRect();
  const popupW = 260;
  let left = rect.left;
  // keep within viewport
  if (left + popupW > window.innerWidth - 12) {
    left = window.innerWidth - popupW - 12;
  }
  let top = rect.bottom + 6;
  specPopup.style.left = left + 'px';
  specPopup.style.top  = top  + 'px';
  specPopup.classList.add('open');
}

function closeSpecPopup() {
  specPopup.classList.remove('open');
}

specPopupClose.addEventListener('click', closeSpecPopup);

// Close when clicking outside
document.addEventListener('click', e => {
  if (specPopup.classList.contains('open')
      && !specPopup.contains(e.target)
      && !e.target.classList.contains('spec-btn')) {
    closeSpecPopup();
  }
});

// Delegate spec-btn clicks (works for dynamically added cards)
document.addEventListener('click', e => {
  if (e.target.classList.contains('spec-btn')) {
    e.stopPropagation();
    if (specPopup.classList.contains('open')) {
      closeSpecPopup();
    } else {
      openSpecPopup(e.target);
    }
  }
});


/* ════════════════════════════════
   LIGHTBOX
════════════════════════════════ */
const lightbox   = document.getElementById('lightbox');
const lbImg      = document.getElementById('lightbox-img');
const lbCaption  = document.getElementById('lightbox-caption');
const lbCounter  = document.getElementById('lightbox-counter');
const lbDots     = document.getElementById('lightbox-dots');
const lbClose    = document.getElementById('lightbox-close');
const lbPrev     = document.getElementById('lb-prev');
const lbNext     = document.getElementById('lb-next');

let lbImages  = [];   // array of image src strings for current product
let lbIndex   = 0;    // current index

function lbShow(index) {
  lbIndex = index;
  lbImg.style.opacity = '0';
  setTimeout(() => {
    lbImg.src = lbImages[lbIndex];
    lbImg.style.opacity = '1';
  }, 100);
  lbImg.style.transition = 'opacity 0.15s ease';

  const total = lbImages.length;

  // counter
  lbCounter.textContent = total > 1 ? `${lbIndex + 1} / ${total}` : '';

  // dots
  lbDots.innerHTML = '';
  if (total > 1) {
    lbImages.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'lb-dot' + (i === lbIndex ? ' active' : '');
      dot.setAttribute('aria-label', `Image ${i + 1}`);
      dot.addEventListener('click', () => lbShow(i));
      lbDots.appendChild(dot);
    });
  }

  // nav buttons
  lbPrev.classList.toggle('hidden', total <= 1);
  lbNext.classList.toggle('hidden', total <= 1);
  lbPrev.disabled = lbIndex === 0;
  lbNext.disabled = lbIndex === total - 1;
}

function openLightbox(images, caption, startIndex = 0) {
  lbImages = images;
  lbCaption.textContent = caption;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
  closeSpecPopup();
  lbShow(startIndex);
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => { if (lbIndex > 0) lbShow(lbIndex - 1); });
lbNext.addEventListener('click', () => { if (lbIndex < lbImages.length - 1) lbShow(lbIndex + 1); });

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowLeft'  && lbIndex > 0)                   lbShow(lbIndex - 1);
  if (e.key === 'ArrowRight' && lbIndex < lbImages.length - 1) lbShow(lbIndex + 1);
});

lbImg.addEventListener('click', e => e.stopPropagation());


/* ════════════════════════════════
   LOAD PRODUCTS
════════════════════════════════ */
fetch('products.json')
  .then(r => r.json())
  .then(products => {

    const container = document.getElementById('productContainer');

    products.forEach(p => {

      // Resolve images array (fall back to single image)
      const imgs = (p.images && p.images.length) ? p.images : [p.image];

      const originalPriceHTML = p.originalPrice
        ? `<span class="price-original">(${p.originalPrice})</span>`
        : '';

      const card = `
        <div class="product">
          <img
            src="${imgs[0]}"
            alt="${p.name}"
            class="lightbox-trigger"
            data-caption="${p.name}"
            data-images='${JSON.stringify(imgs)}'
          >
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="planter-line">
              (Including Decorative Planter Box)
              <button class="spec-btn" type="button">Specifications</button>
            </p>
            <div class="price-row">
              <span class="price-current">${p.price}</span>
              ${originalPriceHTML}
            </div>
            <a href="https://wa.me/8801777634120?text=I%20want%20${encodeURIComponent(p.name)}" class="btn-secondary">Order</a>
          </div>
        </div>
      `;

      container.innerHTML += card;
    });

    // Attach lightbox triggers after cards are rendered
    document.querySelectorAll('.lightbox-trigger').forEach(img => {
      img.addEventListener('click', () => {
        const images  = JSON.parse(img.getAttribute('data-images'));
        const caption = img.getAttribute('data-caption');
        openLightbox(images, caption, 0);
      });
    });

  })
  .catch(err => console.error('Error loading products:', err));

</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <h2>Shop</h2>
</header>

<section class="section">
  <div class="product-grid" id="productContainer">
    <!-- Products will load here -->
  </div>
</section>

<script>
fetch('products.json')
  .then(response => response.json())
  .then(products => {

    const container = document.getElementById('productContainer');

    products.forEach(p => {

      const card = `
        <div class="product">
          <img src="${p.image}" alt="${p.name}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <a href="https://wa.me/8801777634120?text=I%20want%20${encodeURIComponent(p.name)}" class="btn-secondary">Order</a>
          </div>
        </div>
      `;

      container.innerHTML += card;
    });

  })
  .catch(err => {
    console.error("Error loading products:", err);
  });
</script>

</body>
</html>
